<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शहीद दिवस पोस्टर टेम्प्लेट - VICT कंप्यूटर</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .poster-container {
            position: relative;
            width: 320px; /* पोस्टर का अनुपात (9:16) */
            height: 569px; 
            border: 2px solid #ccc;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #fff;
        }

        .poster-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* सुनिश्चित करता है कि पूरी पोस्टर छवि दिखाई दे */
        }

        /* छात्र फोटो अपलोड प्लेसहोल्डर */
        .student-photo-overlay {
            position: absolute;
            bottom: 60px; /* प्लेसहोल्डर की सटीक स्थिति (निचले विवरण के पास) */
            right: 20px; 
            width: 110px; /* पोस्टर पर प्लेसहोल्डर का आकार */
            height: 110px;
            border-radius: 50%;
            border: 3px solid white;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
            transition: all 0.3s ease;
        }

        .student-photo-overlay:hover {
            transform: scale(1.05);
            background-color: #ccc;
        }

        .student-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* शुरुआत में छिपा हुआ */
        }

        .upload-placeholder {
            display: block;
            text-align: center;
            font-size: 14px;
            color: #555;
            line-height: 1.2;
            padding: 10px;
        }

        /* फ़ाइल इनपुट छिपा हुआ */
        #student-photo-input {
            display: none;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <img src="image_2.png" alt="Shaheed Diwas Poster Template" class="poster-image">

        <label for="student-photo-input" class="student-photo-overlay">
            <span class="upload-placeholder">यहाँ छात्र की<br>फोटो लगाएं</span>
            <img src="" alt="Student Preview" class="student-preview" id="student-preview">
        </label>
        <input type="file" id="student-photo-input" accept="image/*">
    </div>

    <script>
        const fileInput = document.getElementById('student-photo-input');
        const previewImage = document.getElementById('student-preview');
        const placeholderText = document.querySelector('.upload-placeholder');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    previewImage.src = reader.result;
                    previewImage.style.display = 'block';
                    placeholderText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
