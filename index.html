<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navratri Poster Maker - VICT Computers</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #fdf3e7;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: auto;
            border-top: 5px solid #006400; /* पोस्टर के रंग से मिलता हुआ */
        }
        h2 { color: #d32f2f; margin-bottom: 5px; }
        h4 { color: #ff8f00; margin-top: 0; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #b71c1c; }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }
        .download-btn {
            display: none;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .footer-text { margin-top: 15px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h2>VICT COMPUTER'S</h2>
        <h4>नवरात्रि शुभकामना पोस्टर जनरेटर</h4>
        
        <div class="form-group">
            <label>विद्यार्थी का नाम:</label>
            <input type="text" id="userName" placeholder="अपना नाम यहाँ लिखें">
        </div>
        
        <div class="form-group">
            <label>अपनी फोटो चुनें:</label>
            <input type="file" id="userPhoto" accept="image/*">
        </div>
        
        <button onclick="generatePoster()">पोस्टर तैयार करें</button>

        <canvas id="posterCanvas"></canvas>
        
        <a id="downloadBtn" class="download-btn" href="#" download="Navratri_Poster_VICT.png">⬇️ पोस्टर डाउनलोड करें</a>

        <div class="footer-text">
            सौजन्य से: VICT COMPUTER'S | सम्पर्क: 8090159016
        </div>
    </div>

    <script>
        function generatePoster() {
            const canvas = document.getElementById('posterCanvas');
            const ctx = canvas.getContext('2d');
            const name = document.getElementById('userName').value;
            const photoInput = document.getElementById('userPhoto');

            if (!name || photoInput.files.length === 0) {
                alert("कृपया अपना नाम लिखें और फोटो अपलोड करें!");
                return;
            }

            const templateImg = new Image();
            templateImg.src = 'template.jpg'; // GitHub पर आपके खाली पोस्टर का नाम

            templateImg.onload = function() {
                // कैनवास का साइज ओरिजिनल पोस्टर के बराबर सेट करें
                canvas.width = templateImg.width;
                canvas.height = templateImg.height;

                // 1. खाली पोस्टर (बैकग्राउंड) ड्रा करें
                ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

                // 2. विद्यार्थी की फोटो लोड करें
                const reader = new FileReader();
                reader.onload = function(event) {
                    const userImg = new Image();
                    userImg.onload = function() {
                        
                        // --- नए Portrait पोस्टर के अनुसार फोटो की सेटिंग ---
                        // सफेद फ्रेम के साइज का अनुमान (प्रतिशत के आधार पर ताकि हर साइज में काम करे)
                        const photoW = canvas.width * 0.25;   // चौड़ाई 25%
                        const photoH = canvas.height * 0.262; // ऊँचाई लगभग 26.
